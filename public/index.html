<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sportz</title>
<style>
  :root {
    --bg: #0a0a0b;
    --surface: #141416;
    --border: #222226;
    --accent: #f5c518;
    --text: #f0f0f0;
    --muted: #888;
    --live: #ff4444;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

  /* Layout */
  .shell { display: grid; grid-template-columns: 200px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { padding: 24px; overflow-y: auto; }

  /* Sidebar */
  .logo { padding: 0 20px 20px; font-weight: 800; font-size: 20px; color: var(--accent); letter-spacing: -0.5px; }
  .logo span { color: var(--text); }
  .nav-section { padding: 8px 20px 4px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .nav-item { display: flex; align-items: center; gap: 8px; padding: 9px 20px; cursor: pointer; color: var(--muted); font-size: 13px; transition: all 0.15s; border-left: 2px solid transparent; }
  .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(245,197,24,0.06); }
  .nav-item .icon { font-size: 15px; width: 18px; text-align: center; }

  /* Live dot */
  .live-dot { width: 7px; height: 7px; background: var(--live); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Cards */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .card:hover { border-color: #333; }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .sport-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 3px 8px; border-radius: 4px; background: rgba(245,197,24,0.12); color: var(--accent); }
  .status-live { font-size: 11px; color: var(--live); font-weight: 600; display: flex; align-items: center; gap: 5px; }
  .status-fin { font-size: 11px; color: var(--muted); }

  /* Match score */
  .teams { display: flex; flex-direction: column; gap: 8px; }
  .team-row { display: flex; justify-content: space-between; align-items: center; }
  .team-name { font-size: 14px; font-weight: 600; }
  .team-score { font-size: 22px; font-weight: 800; color: var(--accent); min-width: 40px; text-align: right; }
  .team-score.winner { color: var(--green); }
  .divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* News */
  .news-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .news-item:last-child { border-bottom: none; }
  .news-img { width: 72px; height: 52px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--border); }
  .news-content h3 { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
  .news-content p { font-size: 12px; color: var(--muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .news-meta { font-size: 11px; color: var(--muted); margin-top: 4px; display: flex; gap: 8px; }

  /* Standings table */
  .standings-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .standings-table th { text-align: left; padding: 8px 10px; color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  .standings-table td { padding: 10px 10px; border-bottom: 1px solid #1a1a1c; }
  .standings-table tr:last-child td { border-bottom: none; }
  .standings-table tr:hover td { background: rgba(255,255,255,0.02); }
  .rank { color: var(--muted); width: 28px; }
  .team-cell { display: flex; align-items: center; gap: 10px; }
  .team-logo { width: 22px; height: 22px; object-fit: contain; }
  .pct { color: var(--accent); font-weight: 600; }

  /* Section header */
  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
  .count-badge { font-size: 12px; background: var(--border); padding: 2px 8px; border-radius: 10px; color: var(--muted); font-weight: 500; }

  /* Loading / empty */
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); font-size: 14px; gap: 10px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

  /* WS status */
  .ws-pill { display: flex; align-items: center; gap: 6px; font-size: 11px; padding: 5px 12px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .ws-pill.connected { border-color: #1a3d1a; color: var(--green); background: rgba(34,197,94,0.06); }
  .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .header-title { font-size: 13px; color: var(--muted); }

  /* Toast */
  #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--accent); color: var(--text); padding: 12px 16px; border-radius: 8px; font-size: 13px; display: none; z-index: 999; max-width: 300px; }
  #toast.show { display: block; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  @media (max-width: 640px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<div class="shell">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">Sportz<span>.</span></div>
    <div class="nav-section">Views</div>
    <div class="nav-item active" onclick="setView('live')">
      <span class="icon">⚡</span> Live
      <div class="live-dot" style="margin-left:auto"></div>
    </div>
    <div class="nav-item" onclick="setView('matches')"><span class="icon">📅</span> Matches</div>
    <div class="nav-item" onclick="setView('standings')"><span class="icon">🏆</span> Standings</div>
    <div class="nav-item" onclick="setView('news')"><span class="icon">📰</span> News</div>
    <div class="nav-section" style="margin-top:12px">Sports</div>
    <div class="nav-item" onclick="setSport('all')"><span class="icon">🌐</span> All Sports</div>
    <div class="nav-item" onclick="setSport('nba')"><span class="icon">🏀</span> NBA</div>
    <div class="nav-item" onclick="setSport('nfl')"><span class="icon">🏈</span> NFL</div>
    <div class="nav-item" onclick="setSport('mlb')"><span class="icon">⚾</span> MLB</div>
    <div class="nav-item" onclick="setSport('nhl')"><span class="icon">🏒</span> NHL</div>
    <div class="nav-item" onclick="setSport('epl')"><span class="icon">⚽</span> EPL</div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="header-bar">
      <div class="header-title" id="header-title">Live Matches</div>
      <div class="ws-pill" id="ws-status">
        <div class="live-dot" style="background:var(--muted)"></div>
        WS connecting…
      </div>
    </div>

    <!-- Sport tabs (for matches/standings/news) -->
    <div class="tabs" id="sport-tabs" style="display:none">
      <div class="tab active" onclick="setSport('all')">All</div>
      <div class="tab" onclick="setSport('nba')">NBA</div>
      <div class="tab" onclick="setSport('nfl')">NFL</div>
      <div class="tab" onclick="setSport('mlb')">MLB</div>
      <div class="tab" onclick="setSport('nhl')">NHL</div>
      <div class="tab" onclick="setSport('epl')">EPL</div>
    </div>

    <div id="content"></div>
  </main>
</div>

<div id="toast"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const API = 'https://sportz-8zce.onrender.com/api/v1';
const WS_URL = 'wss://sportz-8zce.onrender.com/ws';

let state = { view: 'live', sport: 'all', data: null, loading: false };
let ws = null;

// ── Utils ────────────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

async function apiFetch(path) {
  const res = await fetch(API + path);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const { data } = await res.json();
  return data;
}

function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString();
}

// ── Render helpers ───────────────────────────────────────────────────────────
function renderLoading() {
  $('content').innerHTML = `<div class="loading"><div class="spinner"></div> Loading…</div>`;
}

function renderEmpty(msg = 'No data available.') {
  $('content').innerHTML = `<div class="empty">${msg}</div>`;
}

function matchCard(m) {
  const isLive = m.isLive;
  const statusHtml = isLive
    ? `<div class="status-live"><div class="live-dot"></div>${m.clock || 'LIVE'}</div>`
    : `<div class="status-fin">${m.statusShort || (m.isFinished ? 'FT' : 'Scheduled')}</div>`;

  const homeWinner = m.home?.winner;
  const awayWinner = m.away?.winner;

  return `
    <div class="card" id="match-${m.id}">
      <div class="card-header">
        <span class="sport-tag">${m.sport?.toUpperCase()}</span>
        ${statusHtml}
      </div>
      <div class="teams">
        <div class="team-row">
          <span class="team-name">${m.home?.name ?? '—'}</span>
          <span class="team-score ${homeWinner ? 'winner' : ''}">${m.home?.score ?? '—'}</span>
        </div>
        <div class="divider"></div>
        <div class="team-row">
          <span class="team-name">${m.away?.name ?? '—'}</span>
          <span class="team-score ${awayWinner ? 'winner' : ''}">${m.away?.score ?? '—'}</span>
        </div>
      </div>
    </div>`;
}

function newsItem(a) {
  return `
    <div class="news-item" onclick="window.open('${a.url || '#'}','_blank')">
      ${a.image ? `<img class="news-img" src="${a.image}" onerror="this.style.display='none'" loading="lazy">` : ''}
      <div class="news-content">
        <h3>${a.headline || 'No headline'}</h3>
        <p>${a.description || ''}</p>
        <div class="news-meta">
          <span>${a.sport?.toUpperCase() || ''}</span>
          <span>${relTime(a.published)}</span>
        </div>
      </div>
    </div>`;
}

function standingRow(s, i) {
  const pct = typeof s.pct === 'number' ? s.pct.toFixed(3) : s.pct;
  return `
    <tr>
      <td class="rank">${i+1}</td>
      <td><div class="team-cell">
        ${s.logo ? `<img class="team-logo" src="${s.logo}" onerror="this.style.display='none'" loading="lazy">` : ''}
        <span>${s.teamName || '—'}</span>
      </div></td>
      <td>${s.wins ?? '—'}</td>
      <td>${s.losses ?? '—'}</td>
      <td class="pct">${pct ?? '—'}</td>
      <td style="color:var(--muted)">${s.streak ?? ''}</td>
    </tr>`;
}

// ── Views ────────────────────────────────────────────────────────────────────
async function renderLive() {
  renderLoading();
  try {
    const data = await apiFetch('/matches/live');
    if (!data?.length) return renderEmpty('No live matches right now.');
    $('content').innerHTML = `
      <div class="section-title">Live <span class="count-badge">${data.length}</span></div>
      <div class="grid">${data.map(matchCard).join('')}</div>`;
  } catch(e) { renderEmpty('Failed to load live matches.'); }
}

async function renderMatches() {
  renderLoading();
  const q = state.sport !== 'all' ? `?sport=${state.sport}` : '';
  try {
    const data = await apiFetch('/matches' + q);
    if (!data?.length) return renderEmpty('No matches found.');
    const live = data.filter(m => m.isLive);
    const upcoming = data.filter(m => !m.isLive && !m.isFinished);
    const finished = data.filter(m => m.isFinished);
    let html = '';
    if (live.length) html += `<div class="section-title">Live <span class="count-badge">${live.length}</span></div><div class="grid">${live.map(matchCard).join('')}</div><br>`;
    if (upcoming.length) html += `<div class="section-title">Upcoming <span class="count-badge">${upcoming.length}</span></div><div class="grid">${upcoming.map(matchCard).join('')}</div><br>`;
    if (finished.length) html += `<div class="section-title">Recent <span class="count-badge">${finished.length}</span></div><div class="grid">${finished.map(matchCard).join('')}</div>`;
    $('content').innerHTML = html;
  } catch(e) { renderEmpty('Failed to load matches.'); }
}

async function renderStandings() {
  renderLoading();
  const q = state.sport !== 'all' ? `?sport=${state.sport}` : '';
  try {
    const data = await apiFetch('/standings' + q);
    if (!data?.length) return renderEmpty('No standings available.');

    // Group by sport
    const bySport = {};
    data.forEach(s => { (bySport[s.sport] = bySport[s.sport] || []).push(s); });

    let html = '';
    for (const [sport, entries] of Object.entries(bySport)) {
      html += `
        <div class="section-title" style="margin-top:${html ? 24 : 0}px">
          ${sport.toUpperCase()} Standings
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px">
        <table class="standings-table">
          <thead><tr>
            <th>#</th><th>Team</th><th>W</th><th>L</th><th>PCT</th><th>Streak</th>
          </tr></thead>
          <tbody>${entries.slice(0,15).map((s,i) => standingRow(s,i)).join('')}</tbody>
        </table></div>`;
    }
    $('content').innerHTML = html;
  } catch(e) { renderEmpty('Failed to load standings.'); }
}

async function renderNews() {
  renderLoading();
  const q = state.sport !== 'all' ? `?sport=${state.sport}` : '';
  try {
    const data = await apiFetch('/news' + q);
    if (!data?.length) return renderEmpty('No news available.');
    $('content').innerHTML = `
      <div class="section-title">Latest News <span class="count-badge">${data.length}</span></div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px 16px">
        ${data.slice(0,30).map(newsItem).join('')}
      </div>`;
  } catch(e) { renderEmpty('Failed to load news.'); }
}

// ── Navigation ───────────────────────────────────────────────────────────────
const viewTitles = { live: '⚡ Live Matches', matches: '📅 All Matches', standings: '🏆 Standings', news: '📰 News' };

function setView(v) {
  state.view = v;
  state.sport = 'all';
  $('header-title').textContent = viewTitles[v] || v;

  // Sidebar active
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().toLowerCase().startsWith(v === 'live' ? 'live' : v === 'matches' ? 'match' : v));
  });

  // Tabs
  const showTabs = v !== 'live';
  $('sport-tabs').style.display = showTabs ? 'flex' : 'none';
  if (showTabs) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.textContent.toLowerCase() === 'all'));
  }

  render();
}

function setSport(s) {
  state.sport = s;

  // Nav sport active
  document.querySelectorAll('.nav-item').forEach(el => {
    const txt = el.textContent.trim().toLowerCase();
    if (['all sports','nba','nfl','mlb','nhl','epl'].some(k => txt.startsWith(k))) {
      el.classList.toggle('active', (s === 'all' && txt.startsWith('all')) || txt.startsWith(s));
    }
  });

  // Tab active
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.textContent.toLowerCase() === s || (s === 'all' && t.textContent.toLowerCase() === 'all'));
  });

  render();
}

function render() {
  if (state.view === 'live') renderLive();
  else if (state.view === 'matches') renderMatches();
  else if (state.view === 'standings') renderStandings();
  else if (state.view === 'news') renderNews();
}

// ── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    const pill = $('ws-status');
    pill.className = 'ws-pill connected';
    pill.innerHTML = '<div class="live-dot"></div> Live';
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'score_update') {
        const m = msg.data;
        const card = document.getElementById('match-' + m.id);
        if (card) {
          card.outerHTML = matchCard(m);
        }
        showToast(`⚡ ${m.home?.name} ${m.home?.score} – ${m.away?.score} ${m.away?.name}`);
      } else if (msg.type === 'match_started') {
        showToast(`🏁 Match started: ${msg.data?.name || ''}`);
        if (state.view === 'live') renderLive();
      } else if (msg.type === 'match_finished') {
        showToast(`🏆 Match finished`);
        if (state.view === 'live') renderLive();
      }
    } catch {}
  };

  ws.onclose = () => {
    const pill = $('ws-status');
    pill.className = 'ws-pill';
    pill.innerHTML = '<div class="live-dot" style="background:var(--muted)"></div> Reconnecting…';
    setTimeout(connectWS, 5000);
  };

  ws.onerror = () => ws.close();
}

// ── Init ─────────────────────────────────────────────────────────────────────
connectWS();
render();

// Auto-refresh live view every 30s
setInterval(() => { if (state.view === 'live') renderLive(); }, 30000);
</script>
</body>
</html>
